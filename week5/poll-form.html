<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WDD 130 | HTML Form - User Poll</title>
  <meta charset="UTF-8">
  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <!-- CSS file -->
  <link rel="stylesheet" href="styles/poll-form.css">
</head>
<body>
<header>
  <h1>WDD 130 | Evans Nkrumah | HTML Form - User Poll</h1>
</header>
<main>
    <form>
        <fieldset >
                <legend>Contact Informatio</legend>
            <div class="form-item">
                <label for="">Full name</label>
                <input type="text" id="fullname" name="fullname">
            </div>
            <div class="form-item column2">
                <label for="useremail">Email</label>
                <input type="email" id="useremail" name="useremail">
            </div>
            
        </fieldset>

        <fieldset>
            <legend>Questionis</legend>
            <label for="browser">What is your favorite browser?</label>
            <select id=" browser" name="browser">
                <option value="chrome">Chrome</option>
                <option value="firefox">Firefox</option>
                <option value=" safari">Safari</option>
                <option value="edge">Edge</option>
                <option value="brave">Brave</option>
                <option value="other">Other</option>
            </select>
            <label for="pet">Do you have a household pet?</label>
            <input type="checkbox" id="pet" name="pet">

            <label for="feedback">List of places you have lived :</label>
            <textarea id="feedback" name="feedback" rows="4" placeholder="Inchaban Mbodomabamu, Takoradi-Ghana,"></textarea>
        </fieldset>
        
        <button type="submit">Submit Poll</button>
    </form>
</main>
<footer>
  <p>©2024 | HTML Form - User Poll Activity | Evans Nkrumah</p>
</footer>
</body>
</html>
